services:
  ppt-service:
    build:
      context: .
      dockerfile: server/Dockerfile
    expose:
      - "8000"
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/data
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - ppt-service
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
